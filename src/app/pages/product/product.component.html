<app-navbar></app-navbar>

<div *ngIf="product; else loading">
  <div class="container mt-5">
    <div class="row">
      <div class="col-md-6">
        <div class="card">

          <img [src]="mainImage" class="card-img-top" alt="{{ product.name }}" />
        </div>
        <div class="mt-3">
          <div class="row">
            <div *ngFor="let image of product.images" class="col-4 mb-2">
              <img 
                [src]="image" 
                class="img-fluid" 
                alt="Product image" 
                (click)="changeMainImage(image)" 
                style="cursor: pointer;" />
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <h2>{{ product.title }}</h2>
        <p><strong>Description:</strong> {{ product.description }}</p>
        <p><strong>Price:</strong> ${{ product.price }}</p>

        <button *ngIf="product" (click)="addToCart(product)" class="btn btn-primary">
          Add to Cart
        </button>
        
      </div>
    </div>
  </div>
</div>

<ng-template #loading>
  <div class="container mt-5">
    <p class="text-center">Loading product details...</p>
  </div>
</ng-template>
